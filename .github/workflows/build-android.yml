name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (Latest)
        uses: actions/setup-node@v4
        with:
          node-version: '22' # नई चेतावनियों को हटाने के लिए अपडेट किया गया

      - name: 3. Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 4. Install Project Dependencies
        run: |
          npm install -g yarn
          yarn install --network-timeout 100000

      - name: 5. Generate Android Folder (अगर गायब है)
        run: |
          npx expo prebuild --platform android --no-install || echo "Prebuild step skipped or native files exist"

      - name: 6. Make Gradlew Executable
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          else
            echo "Error: android/gradlew not found!" && exit 1
          fi

      - name: 7. Build APK with Log
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: 8. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Chelly-Master-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
