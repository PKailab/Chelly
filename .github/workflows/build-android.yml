name: Force Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Diagnostics & Setup Gradle
        # यहाँ हम देखेंगे कि फाइल्स कहाँ हैं और जरूरत पड़ने पर gradlew बनाएंगे
        run: |
          echo "📁 Listing root files:"
          ls -F
          
          # अगर gradlew गायब है तो इसे कमांड से जनरेट करें
          if [ ! -f "gradlew" ]; then
             echo "⚠️ Gradlew missing! Generating new gradle wrapper..."
             gradle wrapper
          fi
          
          chmod +x gradlew
          echo "✅ Gradle is ready."

      - name: 4. Build Android APK
        # यह कमांड अब सीधे ग्रेडल का इस्तेमाल करेगी
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 5. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Chelly-Final-APK
          path: "**/*.apk"
