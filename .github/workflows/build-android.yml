name: Build Chelly Expo APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 4. Force Flat Node Modules & Install (द अल्टीमेट फिक्स)
        # यह कमांड PNPM के शॉर्टकट वाले नखरे बंद कर देगी और Expo को खुश कर देगी
        run: |
          echo "node-linker=hoisted" > .npmrc
          pnpm install

      - name: 5. Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 6. Generate Android Folders (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: 7. Build the Final APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: 8. Upload Application APK
        uses: actions/upload-artifact@v4
        with:
          name: Chelly-Ready-To-Use
          path: "**/*.apk"
